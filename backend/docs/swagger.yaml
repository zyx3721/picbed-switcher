basePath: /
definitions:
  handler.analyzeMarkdownResponse:
    properties:
      counts:
        additionalProperties:
          type: integer
        type: object
      images:
        items:
          $ref: '#/definitions/utils.MarkdownImage'
        type: array
      total:
        type: integer
    type: object
  handler.authRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handler.authResponse:
    properties:
      token:
        type: string
      user:
        additionalProperties: true
        type: object
    type: object
  handler.batchConvertResponse:
    properties:
      results:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  handler.batchMarkdownRequest:
    properties:
      files:
        items:
          $ref: '#/definitions/handler.markdownRequest'
        type: array
      target_config_id:
        type: integer
    type: object
  handler.changeEmailRequest:
    properties:
      email:
        type: string
    type: object
  handler.changePasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      old_password:
        type: string
    type: object
  handler.configField:
    properties:
      key:
        type: string
      label:
        type: string
      placeholder:
        type: string
      required:
        type: boolean
      secret:
        type: boolean
    type: object
  handler.configResponseDoc:
    properties:
      config:
        additionalProperties: true
        type: object
    type: object
  handler.configsResponse:
    properties:
      configs:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  handler.convertMarkdownResponse:
    properties:
      changed:
        type: integer
      content:
        type: string
      filename:
        type: string
      record:
        $ref: '#/definitions/model.ConversionRecord'
      status:
        type: string
    type: object
  handler.createConvertTaskRequest:
    properties:
      files:
        items:
          $ref: '#/definitions/handler.markdownRequest'
        type: array
      target_config_id:
        type: integer
      task_type:
        type: string
    type: object
  handler.errorResponse:
    properties:
      error:
        example: 请求失败
        type: string
    type: object
  handler.forgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  handler.healthResponse:
    properties:
      message:
        example: PicBed Switcher API 服务运行正常
        type: string
      status:
        example: ok
        type: string
    type: object
  handler.markdownRequest:
    properties:
      content:
        type: string
      filename:
        type: string
      target_config_id:
        type: integer
    type: object
  handler.messageResponse:
    properties:
      message:
        example: 操作成功
        type: string
    type: object
  handler.picbedConfigRequest:
    properties:
      config:
        additionalProperties:
          type: string
        type: object
      config_name:
        type: string
      is_default:
        type: boolean
      picbed_type:
        type: string
    type: object
  handler.picbedTypeDef:
    properties:
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/handler.configField'
        type: array
      label:
        type: string
      value:
        type: string
    type: object
  handler.picbedTypesResponse:
    properties:
      types:
        items:
          $ref: '#/definitions/handler.picbedTypeDef'
        type: array
    type: object
  handler.recordResponse:
    properties:
      record:
        $ref: '#/definitions/model.ConversionRecord'
    type: object
  handler.recordsResponse:
    properties:
      records:
        items:
          $ref: '#/definitions/model.ConversionRecord'
        type: array
    type: object
  handler.resetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      token:
        type: string
    type: object
  handler.taskCreateResponse:
    properties:
      results:
        items:
          additionalProperties: true
          type: object
        type: array
      task:
        $ref: '#/definitions/model.ConversionTask'
    type: object
  handler.taskDetailResponse:
    properties:
      records:
        items:
          $ref: '#/definitions/model.ConversionRecord'
        type: array
      task:
        $ref: '#/definitions/model.ConversionTask'
    type: object
  handler.tasksResponse:
    properties:
      tasks:
        items:
          $ref: '#/definitions/model.ConversionTask'
        type: array
    type: object
  handler.userResponse:
    properties:
      user:
        additionalProperties: true
        type: object
    type: object
  handler.verifyEmailRequest:
    properties:
      token:
        type: string
    type: object
  model.ConversionRecord:
    properties:
      converted_content:
        type: string
      created_at:
        type: string
      details:
        items:
          $ref: '#/definitions/model.ConversionRecordDetail'
        type: array
      error_message:
        type: string
      id:
        type: integer
      image_count:
        type: integer
      original_filename:
        type: string
      source_picbed:
        type: string
      status:
        description: success/failed/processing
        type: string
      target_picbed:
        type: string
      task_id:
        type: integer
      user_id:
        type: integer
    type: object
  model.ConversionRecordDetail:
    properties:
      created_at:
        type: string
      error:
        type: string
      id:
        type: integer
      original_url:
        type: string
      record_id:
        type: integer
      status:
        type: string
      target_url:
        type: string
    type: object
  model.ConversionTask:
    properties:
      created_at:
        type: string
      ended_at:
        type: string
      error:
        type: string
      failed:
        type: integer
      id:
        type: integer
      message:
        type: string
      started_at:
        type: string
      status:
        type: string
      success:
        type: integer
      task_type:
        type: string
      total:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  utils.MarkdownImage:
    properties:
      alt:
        type: string
      picbed:
        type: string
      raw:
        type: string
      url:
        type: string
    type: object
info:
  contact: {}
  description: Markdown 图床批量转换平台 API
  title: PicBed Switcher API
  version: "1.0"
paths:
  /api/auth/email:
    put:
      consumes:
      - application/json
      parameters:
      - description: 邮箱信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.changeEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.userResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 修改当前用户邮箱
      tags:
      - auth
  /api/auth/email/verification:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 重发邮箱验证邮件
      tags:
      - auth
  /api/auth/email/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: 验证令牌
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.verifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: 验证邮箱
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.authRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: 用户名或邮箱登录
      tags:
      - auth
  /api/auth/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: 密码信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 修改当前用户密码
      tags:
      - auth
  /api/auth/password/forgot:
    post:
      consumes:
      - application/json
      parameters:
      - description: 邮箱信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: 发送密码重置邮件
      tags:
      - auth
  /api/auth/password/reset:
    post:
      consumes:
      - application/json
      parameters:
      - description: 重置密码信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: 使用重置令牌设置新密码
      tags:
      - auth
  /api/auth/profile:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.userResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.authRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: 用户注册
      tags:
      - auth
  /api/convert/analyze:
    post:
      consumes:
      - application/json
      parameters:
      - description: Markdown 内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.markdownRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.analyzeMarkdownResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 分析 Markdown 文档中的图片地址
      tags:
      - convert
  /api/convert/batch:
    post:
      consumes:
      - application/json
      parameters:
      - description: 批量转换请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.batchMarkdownRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.batchConvertResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 批量执行 Markdown 文档转换
      tags:
      - convert
  /api/convert/local-batch:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 本地批量上传清单 JSON，结构为 localBatchManifest
        in: formData
        name: manifest
        required: true
        type: string
      - description: 本地图片文件，可按 manifest.images[].file_key 指定字段名上传；同一字段可提交多个文件
        in: formData
        name: images
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.batchConvertResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 批量上传 Markdown 中引用的本地图片并替换地址
      tags:
      - convert
  /api/convert/process:
    post:
      consumes:
      - application/json
      parameters:
      - description: 转换请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.markdownRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.convertMarkdownResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 执行单个 Markdown 文档转换
      tags:
      - convert
  /api/convert/records:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.recordsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 获取转换历史
      tags:
      - convert
  /api/convert/records/{id}:
    get:
      parameters:
      - description: 记录 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.recordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 获取转换历史详情
      tags:
      - convert
  /api/convert/tasks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.tasksResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 获取转换任务列表
      tags:
      - convert
    post:
      consumes:
      - application/json
      parameters:
      - description: 转换任务请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createConvertTaskRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handler.taskCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 创建转换任务
      tags:
      - convert
  /api/convert/tasks/{id}:
    get:
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.taskDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 获取转换任务详情
      tags:
      - convert
  /api/picbed/configs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.configsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 获取所有图床配置
      tags:
      - picbed
    post:
      consumes:
      - application/json
      parameters:
      - description: 图床配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.picbedConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.configResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 添加图床配置
      tags:
      - picbed
  /api/picbed/configs/{id}:
    delete:
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: 删除图床配置
      tags:
      - picbed
    put:
      consumes:
      - application/json
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 图床配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.picbedConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.configResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
